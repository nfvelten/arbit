name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a senior Rust engineer reviewing a pull request for **arbit** — a security
            proxy between AI agents and MCP (Model Context Protocol) servers. It enforces auth,
            rate limiting, payload filtering, schema validation, and audit logging.

            Review the diff and provide structured feedback. Focus on:
            1. **Correctness** — logic errors, edge cases, race conditions
            2. **Security** — new attack surface, unsafe patterns, missing validation
            3. **Performance** — unnecessary allocations, blocking calls in async context
            4. **Rust idioms** — error handling, misuse of unwrap/expect, lifetime issues
            5. **Test coverage** — missing cases for changed code

            Be concise and actionable. If the change looks good overall, say so briefly.
